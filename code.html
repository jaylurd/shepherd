<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shepherd - Welcome back to the fold</title>

                    "surface-tint": "#735c00",
                    "surface-container-highest": "#eae1d4",
                    "secondary-fixed": "#f7e1a6",
                    "outline": "#7f7663",
                    "on-tertiary-fixed": "#00174b",
                    "on-surface": "#1f1b13",

                    "primary": "#735c00",
                    "error": "#ba1a1a",
                    "surface-variant": "#eae1d4",
                    "surface-dim": "#e1d9cc",
                    "surface-bright": "#fff8f0",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#fbf3e5",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#27438a",
                    "secondary-fixed-dim": "#dac58d",
                    "inverse-on-surface": "#f8f0e2",
                    "surface-container-high": "#efe7da",
                    "tertiary-fixed-dim": "#b4c5ff",
                    "on-surface-variant": "#4d4635",
                    "on-secondary": "#ffffff",
                    "background": "#fff8f0",
                    "outline-variant": "#d0c5af",
                    "secondary": "#6d5d2f",
                    "primary-container": "#d4af37",
                    "on-tertiary-container": "#254188",
                    "on-secondary-container": "#736334",
                    "surface": "#fff8f0",
                    "on-primary-fixed": "#241a00",
                    "on-background": "#1f1b13",
                    "inverse-primary": "#e9c349",
                    "on-secondary-fixed": "#241a00",
                    "surface-container": "#f5eddf",
                    "on-primary": "#ffffff",
                    "secondary-container": "#f7e1a6",
                    "primary-fixed": "#ffe088",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#97b0ff",
                    "on-secondary-fixed-variant": "#544519",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed": "#dbe1ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",

            "spacing": {

                    "unit": "8px",
                    "margin-mobile": "16px",
                    "container-max": "1280px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "label-sm": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"],
                    "headline-md": ["Hanken Grotesk"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        .god-rays {
            background: radial-gradient(circle at 50% -20%, rgba(255, 224, 136, 0.3) 0%, rgba(255, 248, 240, 0) 70%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .float-animation {
            animation: subtle-float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Cinematic Background -->
<div class="fixed inset-0 z-0 overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105" data-alt="A stunning interior of a modern Nigerian church cathedral. Golden sunlight streams through high clerestory windows, creating visible cinematic God rays that illuminate floating dust motes. The atmosphere is warm and reverent, with soft-focus pews and polished wood details. The lighting is high-end and ethereal, featuring a creamy color palette of golds, whites, and soft browns. This premium architectural photograph captures a sense of peace and divine stewardship." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD_aWVHD7znoTIs7fSv8zkUTZAQBUm8aoLBGguqKX5mojAinZXyUJ_9B2XPko1i333lL47AsDQLoP-62ptbJO3Mf3AahRFT5NICi2YWXYuCevwrfDROMSQHrAEQbqKt52wAgshFOC3wNCSBEc0ZOy5hpF562qE2VHCgV6-h2GFw0VBVKBNR3jYKzSf43v6dS7Q3G7X-nUL6DgfNRr7TiX4T0v5VktRMx7Vvk9EiW9V7whSatG4clqvBbxPHAv-7W2F-_oHhIxJcLw')">
</div>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 via-transparent to-transparent"></div>
<div class="absolute inset-0 god-rays"></div>
</div>
<!-- Login Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-12">
<div class="w-full max-w-[480px] glass-panel p-8 md:p-12 rounded-xl shadow-2xl float-animation">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-6 shadow-md">
<span class="material-symbols-outlined text-on-primary-container !text-[32px]">church</span>
</div>
<h1 class="font-display text-headline-lg text-on-surface mb-2 tracking-tight">
                    Welcome back to the fold
                </h1>
<p class="font-body-md text-on-surface-variant max-w-[280px]">
                    Continue your ministry's journey with grace.
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">
                        Ecclesiastical Email
                    </label>
<input class="w-full bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-on-surface transition-all duration-200 outline-none" id="email" name="email" placeholder="pastor@shepherd.ng" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-colors" href="#">
                            Forgot Password?
                        </a>
</div>
<input class="w-full bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg px-4 py-3 text-on-surface transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center space-x-2">
<input class="w-4 h-4 text-primary bg-surface-container-low border-outline-variant rounded focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer" for="remember">
                        Remember this device
                    </label>
</div>
<button class="w-full bg-gradient-to-b from-primary to-primary/90 text-on-primary font-label-md text-label-md py-4 rounded-lg shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="px-4 glass-panel rounded-full text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-highest/30 hover:bg-surface-container-highest/50 border border-outline-variant rounded-lg py-3 px-4 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined !text-[20px]">google</span>
<span class="font-label-md text-label-md">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-highest/30 hover:bg-surface-container-highest/50 border border-outline-variant rounded-lg py-3 px-4 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined !text-[20px]">cloud</span>
<span class="font-label-md text-label-md">iCloud</span>
</button>
</div>
<!-- Register Link -->
<p class="text-center mt-10 font-body-md text-on-surface-variant">
                New to the Shepherd community? 
                <a class="text-primary font-semibold hover:underline" href="#">Join today</a>
</p>
</div>
</main>
<!-- Simple Footer for Focused Experience -->
<footer class="relative z-10 w-full px-margin-desktop py-8 text-center md:flex md:justify-between md:items-center">
<p class="font-label-sm text-label-sm text-on-surface/60">
            © 2024 Shepherd Church Management. All rights reserved.
        </p>
<div class="mt-4 md:mt-0 flex justify-center gap-6">
<a class="font-label-sm text-label-sm text-on-surface/60 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface/60 hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface/60 hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
<script>
        // Micro-interactions for input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.glass-panel').style.transform = 'translateY(-12px) scale(1.01)';
                input.parentElement.closest('.glass-panel').style.transition = 'all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.glass-panel').style.transform = 'translateY(0) scale(1)';
            });
        });
    </script>
</body></html>
