<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shepherd | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<!-- Tailwind Configuration (Mirrored from code.html & DESIGN.md) -->
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface": "#fff8f0",
          "on-primary-fixed": "#241a00",
          "outline-variant": "#d0c5af",
          "primary-fixed-dim": "#e9c349",
          "error": "#ba1a1a",
          "tertiary-fixed": "#dbe1ff",
          "surface-variant": "#eae1d4",
          "on-secondary-container": "#736334",
          "error-container": "#ffdad6",
          "secondary-fixed-dim": "#dac58d",
          "on-secondary-fixed": "#241a00",
          "tertiary": "#415ba4",
          "secondary-container": "#f7e1a6",
          "on-secondary": "#ffffff",
          "inverse-primary": "#e9c349",
          "primary": "#735c00",
          "on-secondary-fixed-variant": "#544519",
          "surface-tint": "#735c00",
          "on-surface-variant": "#4d4635",
          "on-tertiary": "#ffffff",
          "surface-container-low": "#fbf3e5",
          "surface-container": "#f5eddf",
          "inverse-surface": "#343027",
          "on-background": "#1f1b13",
          "secondary-fixed": "#f7e1a6",
          "secondary": "#6d5d2f",
          "background": "#fff8f0",
          "primary-container": "#d4af37",
          "on-tertiary-fixed-variant": "#27438a",
          "surface-container-highest": "#eae1d4",
          "surface-container-high": "#efe7da",
          "on-primary-fixed-variant": "#574500",
          "tertiary-container": "#97b0ff",
          "on-error": "#ffffff",
          "on-tertiary-fixed": "#00174b",
          "on-tertiary-container": "#254188",
          "surface-container-lowest": "#ffffff",
          "inverse-on-surface": "#f8f0e2",
          "tertiary-fixed-dim": "#b4c5ff",
          "on-primary-container": "#554300",
          "outline": "#7f7663",
          "on-error-container": "#93000a",
          "on-surface": "#1f1b13",
          "surface-dim": "#e1d9cc",
          "on-primary": "#ffffff",
          "surface-bright": "#fff8f0",
          "primary-fixed": "#ffe088"
        },
        "fontFamily": {
          "display": ["Hanken Grotesk"],
          "body": ["Plus Jakarta Sans"]
        }
      }

<style>
  .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
  }
</style>
</head>

<body class="bg-surface font-body text-on-surface antialiased min-h-screen relative flex items-center justify-center">

  <!-- Background Image with Dark Overlay -->
  <div class="fixed inset-0 z-0">
    <img src="pexels-michael-d-beckwith-2150568551-31269286.jpg" alt="Church Background" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>
  </div>

  <!-- Centered Glass Card -->
  <div class="relative z-10 w-full max-w-md mx-auto px-6 py-12">
    <div class="bg-surface/95 backdrop-blur-xl border border-outline-variant/30 rounded-[32px] p-8 sm:p-10 shadow-2xl">
      
      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <div class="w-12 h-12 bg-primary-container/20 rounded-xl flex items-center justify-center text-primary border border-primary-container/30">
          <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">church</span>
        </div>
      </div>

      <!-- Headings -->
      <div class="text-center mb-8">
        <h1 class="font-display text-3xl font-bold text-on-surface mb-2 tracking-tight">Welcome back to the fold</h1>
        <p class="text-on-surface-variant text-sm">Continue your ministry's journey with grace.</p>
      </div>

      <!-- Form -->
      <form action="#" class="space-y-6">
        <div class="space-y-1.5 text-left">
          <label class="block text-xs font-semibold text-on-surface uppercase tracking-widest pl-1">Ecclesiastical Email</label>
          <input type="email" class="w-full bg-white border border-outline-variant/60 rounded-xl px-4 py-3.5 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="pastor@shepherd.ng" required>
        </div>

        <div class="space-y-1.5 text-left">
          <div class="flex justify-between items-center pl-1">
            <label class="block text-xs font-semibold text-on-surface uppercase tracking-widest">Password</label>
            <a href="#" class="text-xs text-primary font-semibold hover:text-primary-container transition-colors">Forgot Password?</a>
          </div>
          <input type="password" class="w-full bg-white border border-outline-variant/60 rounded-xl px-4 py-3.5 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="••••••••" required>
        </div>

        <button type="submit" class="w-full bg-primary text-on-primary font-bold text-sm rounded-xl px-4 py-4 mt-2 shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all active:scale-[0.98]">
          Sign in
        </button>
      </form>

      <!-- Social Logins -->
      <div class="mt-8 flex gap-6 justify-center">
        <a href="#" class="flex items-center gap-2 text-xs font-semibold text-on-surface hover:text-primary transition-colors uppercase tracking-widest">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </a>
        <a href="#" class="flex items-center gap-2 text-xs font-semibold text-on-surface hover:text-primary transition-colors uppercase tracking-widest">
          <span class="material-symbols-outlined text-sm">cloud</span>
          iCloud
        </a>
      </div>

    </div>

    <!-- Footer -->
    <p class="mt-8 text-center text-sm text-surface drop-shadow-md">
      New to the Shepherd community? <br class="sm:hidden" /> <a href="signup.html" class="text-primary-container font-semibold hover:text-white transition-colors">Join today</a>
    </p>

  </div>

</body>
</html>
